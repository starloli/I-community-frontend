<div class="login-container">
  <div class='allPage'>

    @if(bo) {
      <h1>忘記密碼</h1>
      <form [formGroup]="form" (ngSubmit)="forget()">

        <!-- 註冊信箱 -->
        <div class="signUpTxtb">
          <label>註冊信箱</label>
          <input type="text" formControlName="email" placeholder="請輸入註冊信箱" />

          @if(form.get('email')?.touched && form.get('email')?.invalid) {
            @if(form.get('email')?.errors?.['required']) {
              <small>請輸入信箱</small>
            }
            @if(form.get('email')?.errors?.['email']) {
              <small>信箱格式錯誤</small>
            }
          }

          @if(hasEmailError) {
            <small>信箱不存在</small>
          }
        </div>

        <!-- 送出 -->
        <button class="logtb" type="submit" [disabled]="form.invalid">
          送出連結
        </button>

        <a href="http://localhost:4200/login">返回</a>

      </form>
    } @else {
      <h1>已寄出連結，請至信箱查看</h1>
      <button class="logtb" (click)="toLoginPage()">返回登入頁面</button>
    }

  </div>
</div>
