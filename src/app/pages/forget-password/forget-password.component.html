<div class="login-container">
  <div class="login-wrapper">
    <div class="right-panel">
      <div class='allPage'>

        @if(bo) {
        <h1>忘記密碼</h1>
        <p class="subtitle">請輸入您的註冊信箱，我們將寄送重設密碼連結給您。</p>
        
        <form [formGroup]="form" (ngSubmit)="forget()">

          <!-- 註冊信箱 -->
          <div class="signUpTxtb">
            <span class="input-label">註冊信箱
              @if(form.get('email')?.touched && form.get('email')?.invalid) {
                <span class="inline-error">
                  <svg xmlns="http://www.w3.org/2000/svg" height="16px" viewBox="0 -960 960 960" width="16px" fill="currentColor">
                    <path d="M480-280q17 0 28.5-11.5T520-320q0-17-11.5-28.5T480-360q-17 0-28.5 11.5T440-320q0 17 11.5 28.5T480-280Zm-40-160h80v-240h-80v240Zm40 360q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"/>
                  </svg>
                  @if(form.get('email')?.errors?.['required']) { 請輸入信箱 }
                  @else if(form.get('email')?.errors?.['email']) { 信箱格式錯誤 }
                </span>
              }
              @if(hasEmailError) {
                <span class="inline-error">
                  <svg xmlns="http://www.w3.org/2000/svg" height="16px" viewBox="0 -960 960 960" width="16px" fill="currentColor">
                    <path d="M480-280q17 0 28.5-11.5T520-320q0-17-11.5-28.5T480-360q-17 0-28.5 11.5T440-320q0 17 11.5 28.5T480-280Zm-40-160h80v-240h-80v240Zm40 360q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"/>
                  </svg>
                  信箱不存在
                </span>
              }
            </span>
            <input type="text" formControlName="email" placeholder="請輸入註冊信箱" (input)="hasEmailError = false" />
          </div>

          <!-- 送出 -->
          <button class="logtb" type="submit" [disabled]="form.invalid">
            送出連結
          </button>

          <div class="bottom-text">
            <button type="button" class="link-btn" (click)="toLoginPage()">返回登入</button>
          </div>

        </form>
        } @else {
          <div class="success-container">
            <div class="success-icon">
              <svg xmlns="http://www.w3.org/2000/svg" height="80px" viewBox="0 -960 960 960" width="80px" fill="#4caf50">
                <path d="m424-296 282-282-56-56-226 226-114-114-56 56 170 170Zm56 216q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"/>
              </svg>
            </div>
            <h1>已寄出連結</h1>
            <p class="subtitle">請至信箱查看郵件並點擊連結重設密碼。</p>
            <button class="logtb" (click)="toLoginPage()">返回登入頁面</button>
          </div>
        }

      </div>
    </div>
  </div>
</div>
