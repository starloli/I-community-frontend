@if (users) {
@for (user of users; track user.userId) {
  <div>
    <h1>{{user.fullName}}</h1>
    <p>{{user.userName}}</p>
    <p>{{user.phone}}</p>
    <p>{{user.email}}</p>
    <p>{{user.squareFootage}}</p>
    <p>{{user.carParkingSpace}}</p>
    <p>{{user.motorParkingSpace}}</p>
    <button (click)="editUser(user)">編輯</button>
  </div>
}
}
