@if (users) {
  <button (click)="getUnqualifiedResident()">嘿嘿</button>
@for (user of users; track user.userId) {
<div>
  <h1>{{user.fullName}}</h1>
  <p>{{user.userName}}</p>
  <p>{{user.phone}}</p>
  <p>{{user.email}}</p>
  <p>{{user.unitNumber}}</p>
  <p>坪數：{{user.squareFootage}}</p>
  <p>汽車停車位：{{user.carParkingSpace}}</p>
  <p>機車停車位：{{user.motorParkingSpace}}</p>
  <button (click)="editUser(user)">編輯</button>
</div>
}
}
