<div class="form-card">
  <div class="form-header">
    <h1>{{user.fullName}}</h1>
  </div>

  <div class="form-body">
    <div class="info-row">
      <div class="info-item">
        <mat-icon>person_outline</mat-icon>
        <span>{{user.userName}}</span>
      </div>
      <div class="info-item">
        <mat-icon>phone_outline</mat-icon>
        <span>{{user.phone}}</span>
      </div>
      <div class="info-item">
        <mat-icon>email_outline</mat-icon>
        <span>{{user.email}}</span>
      </div>
    </div>

    <mat-form-field appearance="outline">
      <mat-label>住址</mat-label>
      <mat-icon matPrefix>home</mat-icon>
      <input matInput type="text" [(ngModel)]="user.unitNumber">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>坪數</mat-label>
      <mat-icon matPrefix>square_foot</mat-icon>
      <input matInput type="number" [(ngModel)]="user.squareFootage" min="0">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>機車位</mat-label>
      <mat-icon matPrefix>two_wheeler</mat-icon>
      <input matInput type="number" [(ngModel)]="user.motorParkingSpace" min="0">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>汽車位</mat-label>
      <mat-icon matPrefix>directions_car</mat-icon>
      <input matInput type="number" [(ngModel)]="user.carParkingSpace" min="0">
    </mat-form-field>
  </div>
  <div class="form-footer">
    <button (click)="returnUser(user)">儲存變更</button>
  </div>
</div>
