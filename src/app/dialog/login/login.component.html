<div class="centered">
  <h1 mat-dialog-title>請先登入</h1>
  <mat-dialog-content>
    <label>
      帳號：
      <input type="text" [(ngModel)]="user.userName">
    </label><br>
    <label>
      密碼：
      <input type="text" [(ngModel)]="user.password">
    </label>
  </mat-dialog-content>
  <mat-dialog-actions>
    <button (click)="returnUser()">登入</button>
    <button [mat-dialog-close]="null">取消</button>
  </mat-dialog-actions>
</div>
