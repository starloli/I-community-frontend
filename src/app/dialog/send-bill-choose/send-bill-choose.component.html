<div class="dialog-wrapper">
  <div class="dialog-header">
    <h1>發送帳單方式</h1>
    <span class="subtitle">請選擇您要執行的發送方式</span>
  </div>

  <div class="choice-container">
    <div class="choice-card individual" (click)="onOpenUnitNumber()">
      <div class="card-icon">
        <mat-icon>person</mat-icon>
      </div>
      <div class="card-content">
        <h3>發送給個人</h3>
        <p>針對單一住戶進行發送</p>
      </div>
      <mat-icon class="arrow">chevron_right</mat-icon>
    </div>

    <div class="choice-card monthly" (click)="onOpenMonthlyBill()">
      <div class="card-icon">
        <mat-icon>date_range</mat-icon>
      </div>
      <div class="card-content">
        <h3>發送月度帳單</h3>
        <p>全體住戶批次批量處理</p>
      </div>
      <mat-icon class="arrow">chevron_right</mat-icon>
    </div>
  </div>
</div>
