<form action="">
  <div class="form-card" (click)="$event.stopPropagation()">
    <div class="form-header">
      <h2>預約 {{ facility.name }}</h2>
      <mat-icon class="close-btn" (click)="closeReserveForm()">close</mat-icon>
    </div>

    <div class="form-body">
      <div class="form-group">
        <label>預約日期 <span class="required">*</span></label>
        <input type="date" [(ngModel)]="reserveForm.date" />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>開始時間 <span class="required">*</span></label>
          <input type="time" [(ngModel)]="reserveForm.startTime" />
        </div>
        <div class="form-group">
          <label>結束時間 <span class="required">*</span></label>
          <input type="time" [(ngModel)]="reserveForm.endTime" />
        </div>
      </div>

      <div class="form-group">
        <label>參與人數</label>
        <input type="number" [(ngModel)]="reserveForm.attendees" min="1" [max]="facility.capacity || 0" />
      </div>
    </div>

    <div class="form-footer">
      <button class="cancel-btn" (click)="closeReserveForm()">取消</button>
      <button class="submit-btn" (click)="submitReservation()">確認預約</button>
    </div>
  </div>
</form>
