<div>
  <label class="field-card">
    <span class="field-label">開始時間</span><br>
    <span class="field-hint">住戶最早可使用的時間</span><br>
    <select name="open_time" [(ngModel)]="remindTime" required>
      <option value="" disabled selected>請選擇提醒時間</option>
      @for (hour of hoursList; track $index) {
      <option [value]="hour">
        {{ hour }}
      </option>
      }
    </select>
    <button (click)="updateRemindTime()">確認</button>
  </label>
</div>
