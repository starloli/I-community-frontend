<div class="sidebar">
  <div class="sidebar-header">
    <mat-icon class="logo-icon">home_work</mat-icon>
    <div class="logo-text">
      <span class="logo-title">Community</span>
      <span class="logo-subtitle">Management System</span>
    </div>
  </div>

  <nav class="sidebar-nav">
    <!-- 滑動色塊（果凍效果） -->
    <div class="sliding-pill" [style.top.px]="pillTop" [style.background]="pillColor">
    </div>

    @for (item of navItems; track item.route; let i = $index) {
    <a class="nav-item" [routerLink]="'/' + item.route" routerLinkActive="active" (mouseenter)="onMouseEnter(i)"
      (mouseleave)="onMouseLeave()">
      <mat-icon>{{ item.icon }}</mat-icon>
      <span>{{ item.label }}</span>
    </a>
    }
  </nav>

  @if (isLoggedIn) {
  <div class="sidebar-footer" (click)="logout()">
    <mat-icon>logout</mat-icon>
    <span>登出</span>
  </div>
  } @else {
  <div class="sidebar-footer" (click)="login()">
    <mat-icon>login</mat-icon>
    <span>登入</span>
  </div>
  }
</div>
