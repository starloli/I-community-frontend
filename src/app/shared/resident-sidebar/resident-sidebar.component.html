<div class="sidebar" [class.collapsed]="isCollapsed">

  <!-- 電腦版收合按鈕 (手機版隱藏) -->
  <button class="collapse-btn" (click)="toggleCollapse()">
    <mat-icon>{{ isCollapsed ? 'chevron_right' : 'chevron_left' }}</mat-icon>
  </button>

  <!-- 手機版頂部 Header (電腦版透過 CSS 隱藏) -->
  <div class="mobile-top-bar">
    <div class="m-header-left">
      <mat-icon class="logo-icon">home_work</mat-icon>
    </div>
    
    <div class="m-header-center">
      <div class="user-avatar-mini">{{ userInitial }}</div>
      <span class="user-name-mini">{{ userName }}</span>
      <button class="edit-btn-mini" routerLink="/resident/userInfo" aria-label="編輯個人資訊">
        <mat-icon>edit</mat-icon>
      </button>
    </div>

    <div class="m-header-right">
      <button class="logout-btn-mini" (click)="logout()">
        <mat-icon>logout</mat-icon>
      </button>
    </div>
  </div>

  <!-- 原本的 Header (電腦版顯示) -->
  <div class="sidebar-header">
    <mat-icon class="logo-icon">home_work</mat-icon>
    <div class="logo-text">
      <span class="logo-title">Community</span>
      <span class="logo-subtitle">住戶服務</span>
    </div>
  </div>

  <!-- 住戶資訊 (電腦版顯示) -->
  <div class="user-info" [class.collapsed]="isCollapsed">
    <div class="user-avatar">{{ userInitial }}</div>
    <div class="user-detail">
      <span class="user-name">{{ userName }}</span>
      <span class="user-unit">{{ unitNumber }}</span>
    </div>
    <button class="edit-button" aria-label="編輯使用者資訊" routerLink="/resident/userInfo">
      <mat-icon>edit</mat-icon>
    </button>
  </div>

  <!-- 導覽選單 (手機版將變為底部 Tab Bar) -->
  <nav class="sidebar-nav">
    @for (item of navItems; track item.route) {
      <a
        class="nav-item"
        [routerLink]="'/' + item.route"
        routerLinkActive="active"
        [style.--nav-item-color]="item.color"
        [title]="isCollapsed ? item.label : ''"
      >
        <mat-icon>{{ item.icon }}</mat-icon>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    }
  </nav>

  <!-- 登出按鈕 (電腦版顯示) -->
  <div class="sidebar-footer-wrap">
    <div class="sidebar-footer" (click)="logout()" [title]="isCollapsed ? '登出' : ''">
      <mat-icon>logout</mat-icon>
      <span class="nav-label">登出</span>
    </div>
  </div>

</div>
